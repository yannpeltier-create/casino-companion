function renderOverlays() {
  document.querySelectorAll('.confirm-overlay, .merci-overlay').forEach(el => el.remove());

  if (confirmAction) {
    const div = document.createElement('div');
    div.className = 'confirm-overlay';
    div.innerHTML = `
      <div class="confirm-card">
        <div class="big-icon">${confirmAction === 'urgence' ? '🆘' : '📡'}</div>
        <h2>${T.confirm_title}</h2>
        <p>${T.confirm_body} <b>${MAS_ID}</b></p>
        <div class="confirm-btns">
          <button class="btn-confirm-send" id="btnSend">${T.confirm_send}</button>
          <button class="btn-confirm-cancel" id="btnCancel">${T.confirm_cancel}</button>
        </div>
      </div>
    `;
    document.body.appendChild(div);
    document.getElementById('btnSend').onclick   = () => sendAlert();
    document.getElementById('btnCancel').onclick = () => { confirmAction = null; renderOverlays(); };
  }

  if (showMerci) {
    const div = document.createElement('div');
    div.className = 'merci-overlay';
    div.innerHTML = `
      <div class="merci-card">
        <div class="big-icon">✅</div>
        <h2>${T.merci_title}</h2>
        <p>${T.merci_body}</p>
        <button class="btn-merci-retour" id="btnMerciRetour">${T.merci_retour}</button>
      </div>
    `;
    document.body.appendChild(div);
    document.getElementById('btnMerciRetour').onclick = () => { showMerci = false; render(); };
  }
}

async function sendAlert() {
  if (isSending) return;
  isSending = true;

  const now      = new Date();
  const position = masConfig.position;

  // Jeu actif
  const jeuId = masConfig.jeu_actif;
  const jeu   = jeuId ? JEU_CONFIG[jeuId] : null;

    const templateParams = {
    type: (confirmAction === 'physique' || confirmAction === 'explication') ? 'assistance' : confirmAction,
    machine:     MAS_ID,
    position:    position,
    date:        now.toLocaleString('fr-FR'),
    jeu_nom:     jeu?.nom     || '—',
    jeu_video:   jeu?.video_url || '—',
    plan_url: 'https://res.cloudinary.com/dp1joq3az/image/upload/v1779500458/plan_casino_MAS-1001_gewhze.png',
  };

  let success = false;
  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
    success = true;
  } catch(e) {
    console.error('EmailJS error', e);
    success = false;
  }

  confirmAction = null;
  isSending     = false;
  showMerci     = success;
  showError     = !success;
  render();
}




// ─── EVENTS ───────────────────────────────────────────────────
function bindEvents() {
  function isProtected(action) {
  return ['technique', 'physique'].includes(action);
}

  // Submenu toggles
  document.querySelectorAll('[data-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.toggle;
      openSubmenu = openSubmenu === key ? null : key;
      if (openSubmenu !== 'regles') openInner = null;
      render();
    });
  });

  // Inner accordion
  document.querySelectorAll('[data-inner]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.inner;
      openInner = openInner === key ? null : key;
      render();
    });
  });

  // Action buttons
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', () => {
      const action = el.dataset.action;

      // Tutorial → ouvre la vidéo directement, pas de modale
      if (action === 'tutorial') {
        const jeuId = masConfig.jeu_actif;
        const jeu   = jeuId ? JEU_CONFIG[jeuId] : null;
        if (jeu && jeu.video_url) {
          window.open(jeu.video_url, '_blank');
        }
        return;
      }

      if (isProtected(action) && !isCasinoWifi) {
        showWifiModal();
        return;
      }
     if (action === 'playsafe_contact') {
       window.location.href = `mailto:${LINKS.playsafe_email}`;
       return;
     }


      if (['urgence','technique','physique','explication'].includes(action)) {
        confirmAction = action;
        renderOverlays();
      }
    });
  });
}
async function checkCasinoNetwork() {
  isCasinoWifi = true;
}

  await checkCasinoNetwork();
  render();
})();
