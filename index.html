      color: #000;

      border-radius: 8px;

      text-align: center;

    .btn-action.disabled {

      color: #555;
      border: 1px solid #333;

const SUPPORTED_LANGS = ['fr','en','de'];
const FALLBACK_LANG   = 'en';

function detectLang() {
  const url = new URLSearchParams(window.location.search).get('lang');
  if (url && SUPPORTED_LANGS.includes(url)) return url;
  const nav = (navigator.language || navigator.userLanguage || '').substring(0, 2).toLowerCase();
  return SUPPORTED_LANGS.includes(nav) ? nav : FALLBACK_LANG;
}

}

// ─── HÔTEL ────────────────────────────────────────────────────
function renderHotel() {
  const isOpen = openSubmenu === 'hotel';
  const hour   = new Date().getHours();
  const isLate = hour >= 0 && hour < 4;

  const hotelContent = isLate
    ? `<div class="sub-item">
        <p style="color:#aaa;font-size:0.85em;margin-bottom:10px;">Les réservations en ligne sont fermées.</p>
        <div class="action-btns">
          <a href="tel:+352584521" class="btn-action">${T.hotel_nuit_cta}</a>
        </div>
       </div>`
    : `<div class="sub-item">
        <div class="action-btns">
          <a href="${LINKS.hotel}" target="_blank" class="btn-action">${T.hotel_jour}</a>
          <a href="${LINKS.hotel_guest_directory}" target="_blank" class="btn-action secondary">Guest Directory</a>
        </div>
       </div>`;

  return `
    <div class="submenu">
      <button class="submenu-header ${isOpen ? 'open' : ''}" data-toggle="hotel">
        <span class="label">${T.hotel_label}</span>
      </button>
      <div class="submenu-body ${isOpen ? 'open' : ''}">
        ${hotelContent}
      </div>
    </div>
  `;
}

// ─── OVERLAYS ─────────────────────────────────────────────────
function renderOverlays() {
  document.querySelectorAll('.confirm-overlay, .merci-overlay').forEach(el => el.remove());

  if (confirmAction) {
    const icons = { urgence:'🆘', technique:'🔧', physique:'🙋', explication:'🎲' };
    const icon  = icons[confirmAction] || '❓';
    const div   = document.createElement('div');
    div.className = 'confirm-overlay';
    div.innerHTML = `
      <div class="confirm-card">
        <div class="big-icon">${icon}</div>
        <h2>${T.confirm_title}</h2>
        <p>${T.confirm_body} <strong>${MAS_ID}</strong></p>
        <div class="confirm-btns">
          <button class="btn-confirm-send" id="btnConfirmSend">${T.confirm_send}</button>
          <button class="btn-confirm-cancel" id="btnConfirmCancel">${T.confirm_cancel}</button>
        </div>
      </div>
    `;
    document.body.appendChild(div);
    document.getElementById('btnConfirmSend').addEventListener('click', sendAlert);
    document.getElementById('btnConfirmCancel').addEventListener('click', () => {
      confirmAction = null; render();
    });
  }

  if (showMerci) {
    const div = document.createElement('div');
    div.className = 'merci-overlay';
    div.innerHTML = `
      <div class="merci-card">
        <div class="big-icon">✅</div>
        <h2>${T.merci_title}</h2>
        <p>${T.merci_body}</p>
        <button class="btn-merci-retour" id="btnMerciRetour">${T.merci_retour}</button>
      </div>
    `;
    document.body.appendChild(div);
    document.getElementById('btnMerciRetour').addEventListener('click', () => {
      showMerci = false; render();
    });
  }
}

// ─── BIND EVENTS ──────────────────────────────────────────────
function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', () => {
      const action = el.dataset.action;
      if (['urgence','technique','physique','explication'].includes(action)) {
        confirmAction = action;
        renderOverlays();
      }
    });
  });

  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.toggle;
      openSubmenu = openSubmenu === key ? null : key;
      render();
    });
  });
}

// ─── SEND ALERT ───────────────────────────────────────────────
async function sendAlert() {
  if (isSending) return;
  isSending = true;

  const now      = new Date();
  const position = MAS_POSITION[MAS_ID] || 'Position inconnue';

  const templateParams = {
    type:     confirmAction,
    machine:  MAS_ID,
    heure:    now.toLocaleTimeString('fr-FR'),
    date:     now.toLocaleDateString('fr-FR'),
    position: position,
    plan_url: `https://www.dropbox.com/scl/fi/06vs4a3u81mwgy9gec8pj/plan_casino.pdf?rlkey=og53hlfi0bhtwbvnxr96ixpdq&st=lhr3vce6&dl=0`
  };

  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
    console.log('✅ Email envoyé');
  } catch (err) {
    console.error('❌ Erreur EmailJS :', err);
  }

  confirmAction = null;
  showMerci     = true;
  isSending     = false;
  render();
}

render();
</script>
