<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plan Casino</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .header {
      text-align: center;
      margin-bottom: 14px;
      width: 100%;
    }
    .header h1 { color: #f0c040; font-size: 1.3em; margin-bottom: 4px; }
    .header .sub { color: #888; font-size: 0.82em; }
    .canvas-wrap {
      width: 100%;
      max-width: 660px;
      overflow: auto;
      border-radius: 14px;
      border: 1px solid #2a2a4a;
      background: #10101f;
    }
    canvas { display: block; }
    .info-bar {
      margin-top: 14px;
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 12px 18px;
      max-width: 660px;
      width: 100%;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .info-item { text-align: center; }
    .info-item .val { color: #f0c040; font-size: 1.1em; font-weight: 700; }
    .info-item .lbl { color: #666; font-size: 0.72em; text-transform: uppercase; letter-spacing: 0.05em; }
    .legend {
      margin-top: 12px;
      max-width: 660px;
      width: 100%;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75em;
      color: #aaa;
    }
    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🗺️ Plan Casino</h1>
  <div class="sub" id="subTitle">Chargement…</div>
</div>

<div class="canvas-wrap">
  <canvas id="planCanvas"></canvas>
</div>

<div class="info-bar" id="infoBar" style="display:none">
  <div class="info-item">
    <div class="val" id="infoMas">—</div>
    <div class="lbl">Machine</div>
  </div>
  <div class="info-item">
    <div class="val" id="infoZone">—</div>
    <div class="lbl">Zone</div>
  </div>
  <div class="info-item">
    <div class="val" id="infoLivraison">—</div>
    <div class="lbl">Livraison</div>
  </div>
  <div class="info-item">
    <div class="val" id="infoTs" style="font-size:0.85em">—</div>
    <div class="lbl">Timestamp</div>
  </div>
</div>

<div class="legend" id="legendBox"></div>

<script>
// ─── CONFIG ZONES ─────────────────────────────────────────────
const ZONES = [
  { key: 'MAIN',      label: 'MAIN',      color: '#1a3a5c', border: '#2a6aac', tx: 30,  ty: 40  },
  { key: 'CENTER',    label: 'CENTER',    color: '#1a3a2a', border: '#2a8a4a', tx: 350, ty: 40  },
  { key: 'OFFSIDE',   label: 'OFFSIDE',   color: '#3a1a1a', border: '#8a2a2a', tx: 30,  ty: 300 },
  { key: 'STADIUM',   label: 'STADIUM',   color: '#2a2a10', border: '#8a7a10', tx: 350, ty: 300 },
  { key: 'DOME',      label: 'DOME',      color: '#2a1a3a', border: '#6a2a8a', tx: 30,  ty: 560 },
  { key: 'MEZZANINE', label: 'MEZZANINE', color: '#10302a', border: '#107060', tx: 350, ty: 560 },
];

// Zone rectangles [x, y, w, h] sur canvas 640×840
const ZONE_RECTS = {
  MAIN:      [20,  30,  290, 240],
  CENTER:    [330, 30,  290, 240],
  OFFSIDE:   [20,  290, 290, 240],
  STADIUM:   [330, 290, 290, 240],
  DOME:      [20,  550, 290, 240],
  MEZZANINE: [330, 550, 290, 240],
};

const CANVAS_W = 640;
const CANVAS_H = 820;

// ─── URL PARAMS ────────────────────────────────────────────────
const params    = new URLSearchParams(window.location.search);
const targetMas = params.get('mas') || null; // ex: "1001"
const tsParam   = params.get('ts')  || null;

// ─── ANIMATION ────────────────────────────────────────────────
let pulse = 0;
let animFrame = null;

// ─── MAIN ─────────────────────────────────────────────────────
async function init() {
  const canvas = document.getElementById('planCanvas');
  canvas.width  = CANVAS_W;
  canvas.height = CANVAS_H;
  const ctx = canvas.getContext('2d');

  // Fetch JSON
  let machines = {};
  try {
    const res  = await fetch('machines_demo.json');
    const data = await res.json();
    machines = data.machines || {};
  } catch(e) {
    console.warn('Impossible de charger machines_demo.json', e);
  }

  // Trouver la MAS cible
  let targetData = null;
  if (targetMas) {
    const key = 'mas_' + targetMas;
    targetData = machines[key] || null;
  }

  // UI
  updateUI(targetData);
  buildLegend();

  // Draw loop si MAS cible (animation halo)
  if (targetData && targetData.plan && targetData.plan.x !== null) {
    function loop() {
      pulse += 0.06;
      drawAll(ctx, machines, targetData);
      animFrame = requestAnimationFrame(loop);
    }
    loop();
  } else {
    drawAll(ctx, machines, targetData);
  }
}

// ─── DRAW ALL ─────────────────────────────────────────────────
function drawAll(ctx, machines, targetData) {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // Fond
  ctx.fillStyle = '#0d0d1f';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Zones
  ZONES.forEach(z => drawZone(ctx, z));

  // MAS
  Object.values(machines).forEach(m => {
    if (!m.plan || m.plan.x === null) return;
    const isTarget = targetData && m.id === targetData.id;
    drawMas(ctx, m, isTarget);
  });

  // Halo animé sur la MAS cible
  if (targetData && targetData.plan && targetData.plan.x !== null) {
    drawHalo(ctx, targetData.plan.x, targetData.plan.y);
  }
}

// ─── ZONE ─────────────────────────────────────────────────────
function drawZone(ctx, z) {
  const [x, y, w, h] = ZONE_RECTS[z.key];

  // Fond zone
  ctx.fillStyle = z.color;
  ctx.beginPath();
  roundRect(ctx, x, y, w, h, 10);
  ctx.fill();

  // Bordure
  ctx.strokeStyle = z.border;
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  roundRect(ctx, x, y, w, h, 10);
  ctx.stroke();

  // Label zone
  ctx.fillStyle   = z.border;
  ctx.font        = 'bold 11px system-ui';
  ctx.letterSpacing = '0.08em';
  ctx.fillText(z.label, x + 10, y + 18);
}

// ─── MAS DOT ──────────────────────────────────────────────────
function drawMas(ctx, m, isTarget) {
  const x = m.plan.x;
  const y = m.plan.y;
  const r = isTarget ? 0 : 5; // si target, on gère via halo

  if (!isTarget) {
    // Point normal
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = m.zone_livraison ? '#3ab06a' : '#4a6a9a';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Label
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.font = '8px system-ui';
    ctx.fillText(m.label, x + 7, y + 3);
  }
}

// ─── HALO ANIMÉ ───────────────────────────────────────────────
function drawHalo(ctx, x, y) {
  const r1 = 10 + Math.sin(pulse) * 4;
  const r2 = 18 + Math.sin(pulse) * 6;
  const r3 = 26 + Math.sin(pulse) * 8;

  // Halo externe
  ctx.beginPath();
  ctx.arc(x, y, r3, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(240,192,64,${0.04 + 0.03 * Math.sin(pulse)})`;
  ctx.fill();

  // Halo moyen
  ctx.beginPath();
  ctx.arc(x, y, r2, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(240,192,64,${0.10 + 0.05 * Math.sin(pulse)})`;
  ctx.fill();

  // Halo interne
  ctx.beginPath();
  ctx.arc(x, y, r1, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(240,192,64,0.25)`;
  ctx.fill();

  // Point central
  ctx.beginPath();
  ctx.arc(x, y, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#f0c040';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Label MAS
  ctx.fillStyle = '#f0c040';
  ctx.font = 'bold 11px system-ui';
  const label = params.get('mas') || '';
  const tw = ctx.measureText(label).width;

  // Badge fond
  ctx.fillStyle = 'rgba(10,10,26,0.85)';
  roundRect(ctx, x - tw/2 - 6, y - 28, tw + 12, 18, 5);
  ctx.fill();
  ctx.strokeStyle = '#f0c040';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.fillStyle = '#f0c040';
  ctx.fillText(label, x - tw/2, y - 14);
}

// ─── UI ───────────────────────────────────────────────────────
function updateUI(data) {
  const sub = document.getElementById('subTitle');
  const bar = document.getElementById('infoBar');

  if (!data) {
    sub.textContent = targetMas
      ? `Machine ${targetMas} — position non définie`
      : 'Vue générale — toutes les machines';
    return;
  }

  sub.textContent = `Alerte · Machine ${data.label} · ${data.position}`;
  bar.style.display = 'flex';

  document.getElementById('infoMas').textContent       = data.label;
  document.getElementById('infoZone').textContent      = data.zone;
  document.getElementById('infoLivraison').textContent = data.zone_livraison ? '✅ Oui' : '❌ Non';
  document.getElementById('infoTs').textContent        = tsParam
    ? decodeURIComponent(tsParam)
    : new Date().toLocaleString('fr-FR');
}

function buildLegend() {
  const box = document.getElementById('legendBox');
  box.innerHTML = `
    <div class="legend-item">
      <div class="legend-dot" style="background:#3ab06a"></div>
      Zone livraison
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#4a6a9a"></div>
      Hors livraison
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#f0c040;border-radius:50%"></div>
      MAS alertée
    </div>
  `;
}

// ─── UTILS ────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

init();
</script>
</body>
</html>
